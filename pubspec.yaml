name: yousu
description: 有速 - 传感器测速APP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.2

  # 传感器
  sensors_plus: ^6.1.1

  # 定位
  geolocator: ^13.0.2

  # 数据持久化
  shared_preferences: ^2.3.4

  # 图表
  fl_chart: ^0.70.2

  # 工具
  intl: ^0.19.0
  path_provider: ^2.1.5
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
